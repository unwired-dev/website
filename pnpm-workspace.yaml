packages:
  - apps/*
  - packages/*

catalog:
  '@rajzik/oxfmt-config': ^4.0.3
  '@rajzik/oxlint-config': ^4.0.3
  '@tailwindcss/postcss': ^4
  '@types/node': ^24
  '@types/react': ^19
  '@types/react-dom': ^19
  oxfmt: ^0.53.0
  oxlint: ^1.68.0
  oxlint-tsgolint: ^0.23.0
  react: 19.2.4
  react-dom: 19.2.4
  tailwindcss: ^4
  typescript: ^5

allowBuilds:
  '@tailwindcss/oxide': true
  msw: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@fallow-cli/darwin-arm64@2.89.0'
  - '@fallow-cli/darwin-x64@2.89.0'
  - '@fallow-cli/linux-arm64-gnu@2.89.0'
  - '@fallow-cli/linux-arm64-musl@2.89.0'
  - '@fallow-cli/linux-x64-gnu@2.89.0'
  - '@fallow-cli/linux-x64-musl@2.89.0'
  - '@fallow-cli/win32-arm64-msvc@2.89.0'
  - '@fallow-cli/win32-x64-msvc@2.89.0'
  - fallow@2.89.0
